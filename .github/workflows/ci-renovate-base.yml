name: Renovate after base image build

on:
  workflow_run:
    workflows: ["CI - Build base image"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  renovate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v43.0.18
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}